before:
  hooks:
    - go mod tidy
    - go generate ./...
builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    dir: .
    main: ./cmd/api/main.go
    binary: spout
archives:
  - id: spout
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"
snapshot:
  name_template: "{{ incpatch .Version }}-next"
changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: pacholoamit
    name: spout
  prerelease: auto
  draft: false
  mode: append
  name_template: "{{.ProjectName}}-{{.Version}}"
  header: |
    ### spout Release: {{ .Tag }}! 

    Welcome to this new release!

  footer: |
    ### Thanks!

    Those were the changes on ({{ .Date }}) Published by Pacholo Amit
