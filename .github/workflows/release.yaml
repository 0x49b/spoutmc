name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag'
        required: true

permissions:
  contents: write

env:
  GO_VERSION: '1.26.1'
  NODE_VERSION: '20'
  JAVA_VERSION: '17'
  BINARY_NAME: 'spoutmc'

jobs:
  prepare:
    name: Resolve release version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Resolve tag and semantic version
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          fi

          if [ -z "$TAG" ]; then
            echo "Tag is required (e.g. v1.2.3)"
            exit 1
          fi

          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG"
          echo "Release version: $VERSION"

  frontend:
    name: Build Frontend
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'

      - name: Install frontend dependencies
        run: |
          cd web
          npm ci

      - name: Build frontend
        run: |
          cd web
          npm run build

      - name: Prepare embedded frontend
        run: |
          mkdir -p internal/webserver/static/dist
          cp -r web/dist/* internal/webserver/static/dist/

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: internal/webserver/static/dist/
          retention-days: 1

  plugins:
    name: Build Plugins
    needs: frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Build plugin jars
        run: |
          cd plugins/velocity-players-bridge
          chmod +x gradlew
          ./gradlew clean shadowJar

      - name: Prepare plugin artifacts
        run: |
          mkdir -p release/plugins
          cp plugins/velocity-players-bridge/build/libs/*.jar release/plugins/
          for f in release/plugins/*.jar; do
            sha256sum "$f" > "$f.sha256"
          done

      - name: Upload plugin artifacts
        uses: actions/upload-artifact@v7
        with:
          name: plugins
          path: release/plugins/*
          retention-days: 1

  go:
    name: Build Go ${{ matrix.goos }}/${{ matrix.goarch }}
    needs:
      - frontend
      - plugins
      - prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download frontend artifact
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: internal/webserver/static/dist/

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          # Determine file extension
          EXT=""
          if [ "$GOOS" = "windows" ]; then
            EXT=".exe"
          fi

          # Set output filename
          OUTPUT="${{ env.BINARY_NAME }}-${GOOS}-${GOARCH}${EXT}"

          # Build with version info and optimizations
          go build \
            -ldflags="-s -w -X main.Version=${{ needs.prepare.outputs.version }} -X spoutmc/internal/webserver.WriteRoutesOnStart=false" \
            -o "${OUTPUT}" \
            ./cmd/spoutmc

          # Create checksum
          sha256sum "${OUTPUT}" > "${OUTPUT}.sha256"

          echo "✅ Built ${OUTPUT} ($(du -h ${OUTPUT} | cut -f1))"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            ${{ env.BINARY_NAME }}-${{ matrix.goos }}-${{ matrix.goarch }}*
          retention-days: 1

  release:
    name: Create Release
    needs:
      - prepare
      - go
      - plugins
    runs-on: ubuntu-latest
    steps:
      - name: Download Go artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true
          pattern: binaries-*

      - name: Download plugin artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true
          name: plugins

      - name: List artifacts
        run: |
          echo "📦 Release artifacts:"
          ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Release ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: release-assets/*
          body: |
            ## 🚀 SpoutMC Release ${{ needs.prepare.outputs.tag }}

            ### 📦 Downloads

            This release contains:

            - **Linux (AMD64)**: `spoutmc-linux-amd64`
            - **Linux (ARM64)**: `spoutmc-linux-arm64`
            - **macOS (Intel)**: `spoutmc-darwin-amd64`
            - **macOS (Apple Silicon)**: `spoutmc-darwin-arm64`
            - **Windows (AMD64)**: `spoutmc-windows-amd64.exe`
            - **Velocity plugin**: `velocity-players-bridge-*.jar`

            ### ✅ Verification

            Every artifact includes a `.sha256` checksum file for verification.

            ```bash
            # Linux/macOS example
            sha256sum -c spoutmc-linux-amd64.sha256

            # Windows PowerShell example
            Get-FileHash spoutmc-windows-amd64.exe -Algorithm SHA256
            ```

            ### 📚 Documentation

            - [Build Instructions](docs/BUILD.md)
            - [Development Guide](docs/DEVELOPMENT.md)
            - [Architecture Guidelines](docs/AGENTS.md)

            ### 🐳 Requirements

            - Docker (for running Minecraft servers)
            - Configuration file: `config/spoutmc.yaml`

            See [docs/BUILD.md](docs/BUILD.md) for detailed setup instructions.