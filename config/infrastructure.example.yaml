# Infrastructure Configuration Example
# This file defines infrastructure containers like databases, caches, etc.
# These containers will be managed separately from game servers.
#
# To enable infrastructure containers:
# 1. Copy this file to infrastructure.yaml in the same directory
# 2. Modify the configuration below as needed
# 3. Restart SpoutMC
#
# Note: Passwords with value 'changeme' will be automatically replaced with
# securely generated passwords displayed in the console on first startup.
# Make sure to save these passwords securely!

infrastructure:
  # Database container (MariaDB)
  - name: database
    image: mariadb:latest
    restart: always
    ports:
      - host: "3306"
        container: "3306"
    volumes:
      - containerpath: /var/lib/mysql  # Database data
      - containerpath: /backup         # Backup directory (optional)
    env:
      MARIADB_ROOT_PASSWORD: changeme  # Will be auto-generated
      MARIADB_PASSWORD: changeme       # Will be auto-generated
      MARIADB_USER: spoutmc
      MARIADB_DATABASE: spoutmc

  # Example: Redis cache (uncomment to enable)
