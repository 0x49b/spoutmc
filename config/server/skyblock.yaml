apiVersion: v1
kind: ConfigMap
metadata:
  name: skyblock-config
data:
  name: "skyblock"
  image: "itzg/minecraft-server"
  env.yaml: |-
    EULA: "TRUE"
    TYPE: "PAPER"
    ONLINE_MODE: "FALSE"
    ENFORCE_SECURE_PROFILE: "FALSE"
    MAX_MEMORY: "8G"
    VERSION: "1.20.4"
    GUI: "FALSE"
    CONSOLE: "FALSE"
    LOG_TIMESTAMP: "TRUE"
    TZ: "Europe/Zurich"
  volumes.yaml: |-
    - hostpath:
        - "testservers"
        - "data"
        - "spoutskyblock"
      containerpath: "/data"
