# SpoutMC Configuration Example
# Copy this file to spoutmc.yaml and customize for your setup

storage:
  data_path: "/path/to/minecraft/data"  # Base directory for all server data

# File browser configuration
files:
  exclude_patterns:
    # Binary files
    - "*.jar"         # Java archives (plugins, server jars)
    - "*.class"       # Compiled Java classes
    - "*.zip"         # Zip archives
    - "*.tar"         # Tar archives
    - "*.gz"          # Gzip files

    # Log files
    - "*.log"         # All log files
    - "*.log.*"       # Rotated logs (latest.log.1, etc.)

    # Temporary/cache files
    - "*.tmp"         # Temporary files
    - "*.temp"        # Temporary files
    - "cache"         # Cache directory
    - "temp"          # Temp directory
    - ".cache"        # Hidden cache directory

    # Version control
    - ".git"          # Git repository
    - ".gitignore"    # Git ignore file
    - ".svn"          # SVN repository

    # Build artifacts
    - "node_modules"  # Node.js dependencies
    - "target"        # Maven build directory
    - "build"         # General build directory

    # System files
    - ".DS_Store"     # macOS metadata
    - "Thumbs.db"     # Windows thumbnails
    - "desktop.ini"   # Windows metadata

# Minecraft versions available for server creation
versions:
  - "1.21.10"
  - "1.21.9"
  - "1.21.8"
  - "1.21.7"
  - "1.21.6"
  - "1.21.5"
  - "1.21.4"
  - "1.21.3"
  - "1.21.2"
  - "1.21.1"
  - "1.21"
  - "1.20.6"
  - "1.20.5"
  - "1.20.4"
  - "1.20.3"
  - "1.20.2"
  - "1.20.1"
  - "1.20"

# Server configurations
servers:
  # Proxy Server (required - only one allowed)
  - name: spoutproxy
    image: itzg/mc-proxy:latest
    proxy: true
    ports:
      - hostPort: "25565"
        containerPort: "25565"
    env:
      TYPE: VELOCITY
      MAX_MEMORY: 512M
    volumes:
      - containerpath: "/server"

  # Lobby Server (recommended - only one allowed)
  - name: lobby
    image: itzg/minecraft-server:latest
    lobby: true
    env:
      TYPE: PAPER
      VERSION: "1.21.10"
      EULA: "TRUE"
      ONLINE_MODE: "FALSE"
      MAX_MEMORY: 2G
    volumes:
      - containerpath: "/data"

  # Game Server (unlimited)
  - name: survival
    image: itzg/minecraft-server:latest
    env:
      TYPE: PAPER
      VERSION: "1.21.10"
      EULA: "TRUE"
      ONLINE_MODE: "FALSE"
      MAX_MEMORY: 4G
      LEVEL_NAME: "Survival World"
      MODE: survival
      DIFFICULTY: hard
    volumes:
      - containerpath: "/data"

# GitOps configuration (optional)
git:
  enabled: false
  repository: "https://github.com/yourusername/spoutmc-config.git"
  branch: "main"
  token: "your-personal-access-token"
  poll_interval: 30s
  webhook_secret: "your-webhook-secret"
  local_path: "./git-config"

# EULA acceptance (required)
eula:
  accepted: false
  accepted_on: "0001-01-01T00:00:00Z"
