servers:
    - name: PROXY
      image: itzg/mc-proxy:latest
      proxy: true
      env:
        JAVA_HOME: /opt/java/openjdk
        JAVA_VERSION: jdk-21.0.9+10
        LANG: en_US.UTF-8
        LANGUAGE: en_US:en
        LC_ALL: en_US.UTF-8
        MEMORY: 512m
        PATH: /opt/java/openjdk/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        RCON_PORT: "25575"
        TYPE: VELOCITY
      ports:
        - hostPort: "25565"
          containerPort: "25565"
      volumes:
        - containerpath: /server
    - name: lobbiii
      image: itzg/minecraft-server:latest
      lobby: true
      env:
        CFG_VELOCITY_ENABLED: "true"
        CFG_VELOCITY_ONLINE_MODE: "true"
        CFG_VELOCITY_SECRET: ciMjBnptosXcDDpIBuO+51yxkaXjrJalX3ktpnLycIQ=
        CONSOLE: "FALSE"
        ENV_VARIABLE_PREFIX: CFG_
        EULA: "TRUE"
        GID: "1000"
        GUI: "FALSE"
        JAVA_HOME: /opt/java/openjdk
        JAVA_VERSION: jdk-21.0.8+9
        LANG: en_US.UTF-8
        LANGUAGE: en_US:en
        LC_ALL: en_US.UTF-8
        ONLINE_MODE: "FALSE"
        PATH: /opt/java/openjdk/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
        REPLACE_ENV_VARIABLES: "TRUE"
        TYPE: PAPER
        UID: "1000"
        VERSION: 1.21.1
      ports:
        - hostPort: "25566"
          containerPort: "25565"
      volumes:
        - containerpath: /data
    - name: skyblock
      image: itzg/minecraft-server:latest
      env:
        CFG_VELOCITY_ENABLED: "true"
        CFG_VELOCITY_ONLINE_MODE: "true"
        CFG_VELOCITY_SECRET: ciMjBnptosXcDDpIBuO+51yxkaXjrJalX3ktpnLycIQ=
        CONSOLE: "FALSE"
        ENV_VARIABLE_PREFIX: CFG_
        EULA: "TRUE"
        GID: "1000"
        GUI: "FALSE"
        JAVA_HOME: /opt/java/openjdk
        JAVA_VERSION: jdk-21.0.8+9
        LANG: en_US.UTF-8
        LANGUAGE: en_US:en
