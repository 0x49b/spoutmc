    enabled: false
    repository: https://github.com/0x49b/spoutmc-config.git
    branch: master
    token: ${SPOUTMC_GIT_TOKEN}
    poll_interval: 30s
    webhook_secret: ${SPOUTMC_WEBHOOK_SECRET}
    local_path: /tmp/spoutmc-git
storage:
    data_path: /home/florian/GolandProjects/spoutmc/testservers/data
