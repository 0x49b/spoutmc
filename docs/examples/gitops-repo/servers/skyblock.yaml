apiVersion: spoutmc.io/v1alpha1
kind: SpoutServer
metadata:
  name: skyblock
spec:
  name: skyblock
  image: itzg/minecraft-server
  restartPolicy:
    container:
      policy: on-failure
      maxRetries: 5
    autoStartOnSpoutmcStart: true
  env:
    EULA: "TRUE"
    TYPE: PAPER
    ONLINE_MODE: "FALSE"
    ENFORCE_SECURE_PROFILE: "FALSE"
    MAX_MEMORY: 8G
    VERSION: 1.21.10
    GUI: "FALSE"
    CONSOLE: "FALSE"
    LOG_TIMESTAMP: "TRUE"
    TZ: Europe/Zurich
  volumes:
    - containerpath: "/data"
