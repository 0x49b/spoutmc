definitions:
  container.ContainerState:
    enum:
    - created
    - running
    - paused
    - restarting
    - removing
    - exited
    - dead
    type: string
    x-enum-comments:
      StateCreated: StateCreated indicates the container is created, but not (yet)
        started.
      StateDead: StateDead indicates that the container failed to be deleted. Containers
        in this state are attempted to be cleaned up when the daemon restarts.
      StateExited: StateExited indicates that the container exited.
      StatePaused: StatePaused indicates that the container's current state is paused.
      StateRemoving: StateRemoving indicates that the container is being removed.
      StateRestarting: StateRestarting indicates that the container is currently restarting.
      StateRunning: StateRunning indicates that the container is running.
    x-enum-varnames:
    - StateCreated
    - StateRunning
    - StatePaused
    - StateRestarting
    - StateRemoving
    - StateExited
    - StateDead
  container.Isolation:
    enum:
    - ""
    - default
    - process
    - hyperv
    type: string
    x-enum-comments:
      IsolationDefault: IsolationDefault is the default isolation mode on current
        daemon
      IsolationEmpty: IsolationEmpty is unspecified (same behavior as default)
      IsolationHyperV: IsolationHyperV is HyperV isolation mode
      IsolationProcess: IsolationProcess is process isolation mode
    x-enum-varnames:
    - IsolationEmpty
    - IsolationDefault
    - IsolationProcess
    - IsolationHyperV
  container.MountPoint:
    properties:
      destination:
        description: |-
          Destination is the path relative to the container root (`/`) where the
          Source is mounted inside the container.
        type: string
      driver:
        description: Driver is the volume driver used to create the volume (if it
          is a volume).
        type: string
      mode:
        description: |-
          Mode is a comma separated list of options supplied by the user when
          creating the bind/volume mount.

          The default is platform-specific (`"z"` on Linux, empty on Windows).
        type: string
      name:
        description: |-
          Name is the name reference to the underlying data defined by `Source`
          e.g., the volume name.
        type: string
      propagation:
        allOf:
        - $ref: '#/definitions/mount.Propagation'
        description: |-
          Propagation describes how mounts are propagated from the host into the
          mount point, and vice-versa. Refer to the Linux kernel documentation
          for details:
          https://www.kernel.org/doc/Documentation/filesystems/sharedsubtree.txt

          This field is not used on Windows.
      rw:
        description: RW indicates whether the mount is mounted writable (read-write).
        type: boolean
      source:
        description: |-
          Source is the source location of the mount.

          For volumes, this contains the storage location of the volume (within
          `/var/lib/docker/volumes/`). For bind-mounts, and `npipe`, this contains
          the source (host) part of the bind-mount. For `tmpfs` mount points, this
          field is empty.
        type: string
      type:
        allOf:
        - $ref: '#/definitions/mount.Type'
        description: |-
          Type is the type of mount, see `Type<foo>` definitions in
          github.com/docker/docker/api/types/mount.Type
    type: object
  container.NetworkSettingsSummary:
    properties:
      networks:
        additionalProperties:
          $ref: '#/definitions/network.EndpointSettings'
        type: object
    type: object
  container.Port:
    properties:
      IP:
        description: Host IP address that the container's port is mapped to
        type: string
      PrivatePort:
        description: |-
          Port on the container
          Required: true
        type: integer
      PublicPort:
        description: Port exposed on the host
        type: integer
      Type:
        description: |-
          type
          Required: true
        type: string
    type: object
  container.Summary:
    properties:
      Id:
        type: string
      ImageManifestDescriptor:
        $ref: '#/definitions/v1.Descriptor'
      command:
        type: string
      created:
        type: integer
      hostConfig:
        properties:
          annotations:
            additionalProperties:
              type: string
            type: object
          networkMode:
            type: string
        type: object
      image:
        type: string
      imageID:
        type: string
      labels:
        additionalProperties:
          type: string
        type: object
      mounts:
        items:
          $ref: '#/definitions/container.MountPoint'
        type: array
      names:
        items:
          type: string
        type: array
      networkSettings:
        $ref: '#/definitions/container.NetworkSettingsSummary'
      ports:
        items:
          $ref: '#/definitions/container.Port'
        type: array
      sizeRootFs:
        type: integer
      sizeRw:
        type: integer
      state:
        $ref: '#/definitions/container.ContainerState'
      status:
        type: string
    type: object
  gorm.DeletedAt:
    properties:
      time:
        type: string
      valid:
        description: Valid is true if Time is not NULL
        type: boolean
    type: object
  internal_webserver_api_v1_host.DiskStat:
    properties:
      mount:
        type: string
      total_bytes:
        type: integer
      used_bytes:
        type: integer
      used_percent:
        type: number
    type: object
  internal_webserver_api_v1_host.OSInfo:
    properties:
      hostname:
        type: string
      kernel_arch:
        description: e.g. "x86_64", "arm64"
        type: string
      kernel_version:
        description: Linux kernel; Windows NT version; macOS kernel
        type: string
      os:
        description: '"linux", "windows", "darwin", ...'
        type: string
      platform:
        description: e.g. "ubuntu", "windows"
        type: string
      platform_family:
        description: e.g. "debian", "fedora", "windows"
        type: string
      platform_version:
        description: e.g. "22.04", "10.0.22631"
        type: string
    type: object
  internal_webserver_api_v1_host.Stats:
    properties:
      cpu_percent:
        description: CPU / Memory
        type: number
      cpus_logical:
        type: integer
      cpus_physical:
        type: integer
      disks:
        description: Storage
        items:
          $ref: '#/definitions/internal_webserver_api_v1_host.DiskStat'
        type: array
      docker:
        allOf:
        - $ref: '#/definitions/system.Info'
        description: |-
          Docker
          Docker *DockerInfo `json:"docker,omitempty"`
      load1:
        description: Load / Uptime
        type: number
      load5:
        type: number
      load15:
        type: number
      mem_total_bytes:
        type: integer
      mem_used_bytes:
        type: integer
      mem_used_percent:
        type: number
      os_info:
        allOf:
        - $ref: '#/definitions/internal_webserver_api_v1_host.OSInfo'
        description: Host/OS
      timestamp:
        type: string
      uptime_seconds:
        type: integer
    type: object
  internal_webserver_api_v1_infrastructure.InfrastructureContainer:
    properties:
      summary:
        $ref: '#/definitions/container.Summary'
      type:
        type: string
    type: object
  internal_webserver_api_v1_server.AddServerRequest:
    properties:
      env:
        additionalProperties:
          type: string
        type: object
      image:
        type: string
      lobby:
        type: boolean
      name:
        type: string
      port:
        description: Optional - required for proxy, auto-assigned for lobby/game
        type: integer
      proxy:
        type: boolean
    required:
    - image
    - name
    type: object
  internal_webserver_api_v1_server.ExecuteCommandRequest:
    properties:
      command:
        type: string
    required:
    - command
    type: object
  internal_webserver_api_v1_server.UpdateServerRequest:
    properties:
      env:
        additionalProperties:
          type: string
        type: object
      name:
        type: string
    type: object
  internal_webserver_api_v1_setup.SetupRequest:
    properties:
      acceptEula:
        type: boolean
      dataPath:
        type: string
    required:
    - acceptEula
    - dataPath
    type: object
  mount.Propagation:
    enum:
    - rprivate
    - private
    - rshared
    - shared
    - rslave
    - slave
    type: string
    x-enum-varnames:
    - PropagationRPrivate
    - PropagationPrivate
    - PropagationRShared
    - PropagationShared
    - PropagationRSlave
    - PropagationSlave
  mount.Type:
    enum:
    - bind
    - volume
    - tmpfs
    - npipe
    - cluster
    - image
    type: string
    x-enum-varnames:
    - TypeBind
    - TypeVolume
    - TypeTmpfs
    - TypeNamedPipe
    - TypeCluster
    - TypeImage
  network.EndpointIPAMConfig:
    properties:
      ipv4Address:
        type: string
      ipv6Address:
        type: string
      linkLocalIPs:
        items:
          type: string
        type: array
    type: object
  network.EndpointSettings:
    properties:
      aliases:
        description: Aliases holds the list of extra, user-specified DNS names for
          this endpoint.
        items:
          type: string
        type: array
      dnsnames:
        description: |-
          DNSNames holds all the (non fully qualified) DNS names associated to this endpoint. First entry is used to
          generate PTR records.
        items:
          type: string
        type: array
      driverOpts:
        additionalProperties:
          type: string
        type: object
      endpointID:
        type: string
      gateway:
        type: string
      globalIPv6Address:
        type: string
      globalIPv6PrefixLen:
        type: integer
      gwPriority:
        description: |-
          GwPriority determines which endpoint will provide the default gateway
          for the container. The endpoint with the highest priority will be used.
          If multiple endpoints have the same priority, they are lexicographically
          sorted based on their network name, and the one that sorts first is picked.
        type: integer
      ipaddress:
        type: string
      ipamconfig:
        allOf:
        - $ref: '#/definitions/network.EndpointIPAMConfig'
        description: Configurations
      ipprefixLen:
        type: integer
      ipv6Gateway:
        type: string
      links:
        items:
          type: string
        type: array
      macAddress:
        description: |-
          MacAddress may be used to specify a MAC address when the container is created.
          Once the container is running, it becomes operational data (it may contain a
          generated address).
        type: string
      networkID:
        description: Operational data
        type: string
    type: object
  registry.IndexInfo:
    properties:
      mirrors:
        description: Mirrors is a list of mirrors, expressed as URIs
        items:
          type: string
        type: array
      name:
        description: Name is the name of the registry, such as "docker.io"
        type: string
      official:
        description: Official indicates whether this is an official registry
        type: boolean
      secure:
        description: |-
          Secure is set to false if the registry is part of the list of
          insecure registries. Insecure registries accept HTTP and/or accept
          HTTPS with certificates from unknown CAs.
        type: boolean
    type: object
  registry.NetIPNet:
    properties:
      ip:
        description: network number
        items:
          type: integer
        type: array
      mask:
        description: network mask
        items:
          type: integer
        type: array
    type: object
  registry.ServiceConfig:
    properties:
      AllowNondistributableArtifactsCIDRs:
        description: 'Deprecated: non-distributable artifacts are deprecated and enabled
          by default. This field will be removed in the next release.'
        items:
          $ref: '#/definitions/registry.NetIPNet'
        type: array
      AllowNondistributableArtifactsHostnames:
        description: 'Deprecated: non-distributable artifacts are deprecated and enabled
          by default. This field will be removed in the next release.'
        items:
          type: string
        type: array
      IndexConfigs:
        additionalProperties:
          $ref: '#/definitions/registry.IndexInfo'
        type: object
      InsecureRegistryCIDRs:
        items:
          $ref: '#/definitions/registry.NetIPNet'
        type: array
      mirrors:
        items:
          type: string
        type: array
    type: object
  spoutmc_internal_models.Role:
    properties:
      createdAt:
        type: string
      deletedAt:
        $ref: '#/definitions/gorm.DeletedAt'
      id:
        type: integer
      rolename:
        type: string
      updatedAt:
        type: string
    type: object
  spoutmc_internal_models.RoleResponse:
    properties:
      rolename:
        type: string
    type: object
  spoutmc_internal_models.User:
    properties:
      avatar:
        type: string
      createdAt:
        type: string
      deletedAt:
        $ref: '#/definitions/gorm.DeletedAt'
      display_name:
        type: string
      email:
        type: string
      id:
        type: integer
      minecraft_id:
        type: string
      roles:
        items:
          $ref: '#/definitions/spoutmc_internal_models.Role'
        type: array
      updatedAt:
        type: string
    type: object
  spoutmc_internal_models.UserResponse:
    properties:
      avatar:
        type: string
      createdAt:
        type: string
      displayName:
        type: string
      email:
        type: string
      id:
        type: integer
      minecraftId:
        type: string
      roles:
        items:
          $ref: '#/definitions/spoutmc_internal_models.RoleResponse'
        type: array
    type: object
  swarm.CAConfig:
    properties:
      externalCAs:
        description: |-
          ExternalCAs is a list of CAs to which a manager node will make
          certificate signing requests for node certificates.
        items:
          $ref: '#/definitions/swarm.ExternalCA'
        type: array
      forceRotate:
        description: |-
          If this value changes, and there is no specified signing cert and key,
          then the swarm is forced to generate a new root certificate and key.
        type: integer
      nodeCertExpiry:
        allOf:
        - $ref: '#/definitions/time.Duration'
        description: NodeCertExpiry is the duration certificates should be issued
          for
      signingCACert:
        description: |-
          SigningCACert and SigningCAKey specify the desired signing root CA and
          root CA key for the swarm.  When inspecting the cluster, the key will
          be redacted.
        type: string
      signingCAKey:
        type: string
    type: object
  swarm.ClusterInfo:
    properties:
      createdAt:
        type: string
      dataPathPort:
        type: integer
      defaultAddrPool:
        items:
          type: string
        type: array
      id:
        type: string
      rootRotationInProgress:
        type: boolean
      spec:
        $ref: '#/definitions/swarm.Spec'
      subnetSize:
        type: integer
      tlsinfo:
        $ref: '#/definitions/swarm.TLSInfo'
      updatedAt:
        type: string
      version:
        $ref: '#/definitions/swarm.Version'
    type: object
  swarm.DiscreteGenericResource:
    properties:
      kind:
        type: string
      value:
        type: integer
    type: object
  swarm.DispatcherConfig:
    properties:
      heartbeatPeriod:
        allOf:
        - $ref: '#/definitions/time.Duration'
        description: |-
          HeartbeatPeriod defines how often agent should send heartbeats to
          dispatcher.
    type: object
  swarm.Driver:
    properties:
      name:
        type: string
      options:
        additionalProperties:
          type: string
        type: object
    type: object
  swarm.EncryptionConfig:
    properties:
      autoLockManagers:
        description: |-
          AutoLockManagers specifies whether or not managers TLS keys and raft data
          should be encrypted at rest in such a way that they must be unlocked
          before the manager node starts up again.
        type: boolean
    type: object
  swarm.ExternalCA:
    properties:
      cacert:
        description: |-
          CACert specifies which root CA is used by this external CA.  This certificate must
          be in PEM format.
        type: string
      options:
        additionalProperties:
          type: string
        description: |-
          Options is a set of additional key/value pairs whose interpretation
          depends on the specified CA type.
        type: object
      protocol:
        allOf:
        - $ref: '#/definitions/swarm.ExternalCAProtocol'
        description: Protocol is the protocol used by this external CA.
      url:
        description: URL is the URL where the external CA can be reached.
        type: string
    type: object
  swarm.ExternalCAProtocol:
    enum:
    - cfssl
    type: string
    x-enum-varnames:
    - ExternalCAProtocolCFSSL
  swarm.GenericResource:
    properties:
      discreteResourceSpec:
        $ref: '#/definitions/swarm.DiscreteGenericResource'
      namedResourceSpec:
        $ref: '#/definitions/swarm.NamedGenericResource'
    type: object
  swarm.Info:
    properties:
      cluster:
        $ref: '#/definitions/swarm.ClusterInfo'
      controlAvailable:
        type: boolean
      error:
        type: string
      localNodeState:
        $ref: '#/definitions/swarm.LocalNodeState'
      managers:
        type: integer
      nodeAddr:
        type: string
      nodeID:
        type: string
      nodes:
        type: integer
      remoteManagers:
        items:
          $ref: '#/definitions/swarm.Peer'
        type: array
      warnings:
        items:
          type: string
        type: array
    type: object
  swarm.LocalNodeState:
    enum:
    - inactive
    - pending
    - active
    - error
    - locked
    type: string
    x-enum-varnames:
    - LocalNodeStateInactive
    - LocalNodeStatePending
    - LocalNodeStateActive
    - LocalNodeStateError
    - LocalNodeStateLocked
  swarm.NamedGenericResource:
    properties:
      kind:
        type: string
      value:
        type: string
    type: object
  swarm.OrchestrationConfig:
    properties:
      taskHistoryRetentionLimit:
        description: |-
          TaskHistoryRetentionLimit is the number of historic tasks to keep per instance or
          node. If negative, never remove completed or failed tasks.
        type: integer
    type: object
  swarm.Peer:
    properties:
      addr:
        type: string
      nodeID:
        type: string
    type: object
  swarm.RaftConfig:
    properties:
      electionTick:
        description: |-
          ElectionTick is the number of ticks that a follower will wait for a message
          from the leader before becoming a candidate and starting an election.
          ElectionTick must be greater than HeartbeatTick.

          A tick currently defaults to one second, so these translate directly to
          seconds currently, but this is NOT guaranteed.
        type: integer
      heartbeatTick:
        description: |-
          HeartbeatTick is the number of ticks between heartbeats. Every
          HeartbeatTick ticks, the leader will send a heartbeat to the
          followers.

          A tick currently defaults to one second, so these translate directly to
          seconds currently, but this is NOT guaranteed.
        type: integer
      keepOldSnapshots:
        description: |-
          KeepOldSnapshots is the number of snapshots to keep beyond the
          current snapshot.
        type: integer
      logEntriesForSlowFollowers:
        description: |-
          LogEntriesForSlowFollowers is the number of log entries to keep
          around to sync up slow followers after a snapshot is created.
        type: integer
      snapshotInterval:
        description: SnapshotInterval is the number of log entries between snapshots.
        type: integer
    type: object
  swarm.Spec:
    properties:
      Labels:
        additionalProperties:
          type: string
        type: object
      caconfig:
        $ref: '#/definitions/swarm.CAConfig'
      dispatcher:
        $ref: '#/definitions/swarm.DispatcherConfig'
      encryptionConfig:
        $ref: '#/definitions/swarm.EncryptionConfig'
      name:
        type: string
      orchestration:
        $ref: '#/definitions/swarm.OrchestrationConfig'
      raft:
        $ref: '#/definitions/swarm.RaftConfig'
      taskDefaults:
        $ref: '#/definitions/swarm.TaskDefaults'
    type: object
  swarm.TLSInfo:
    properties:
      certIssuerPublicKey:
        description: CertIssuerPublicKey is the raw public key bytes of the issuer
        items:
          type: integer
        type: array
      certIssuerSubject:
        description: CertIssuer is the raw subject bytes of the issuer
        items:
          type: integer
        type: array
      trustRoot:
        description: TrustRoot is the trusted CA root certificate in PEM format
        type: string
    type: object
  swarm.TaskDefaults:
    properties:
      logDriver:
        allOf:
        - $ref: '#/definitions/swarm.Driver'
        description: |-
          LogDriver selects the log driver to use for tasks created in the
          orchestrator if unspecified by a service.

          Updating this value will only have an affect on new tasks. Old tasks
          will continue use their previously configured log driver until
          recreated.
    type: object
  swarm.Version:
    properties:
      index:
        type: integer
    type: object
  system.Commit:
    properties:
      expected:
        description: |-
          Expected is the commit ID of external tool expected by dockerd as set at build time.

          Deprecated: this field is no longer used in API v1.49, but kept for backward-compatibility with older API versions.
        type: string
      id:
        description: ID is the actual commit ID or version of external tool.
        type: string
    type: object
  system.ContainerdInfo:
    properties:
      address:
        description: Address is the path to the containerd socket.
        type: string
      namespaces:
        allOf:
        - $ref: '#/definitions/system.ContainerdNamespaces'
        description: Namespaces is the containerd namespaces used by the daemon.
    type: object
  system.ContainerdNamespaces:
    properties:
      containers:
        description: |-
          Containers holds the default containerd namespace used for
          containers managed by the daemon.

          The default namespace for containers is "moby", but will be
          suffixed with the `<uid>.<gid>` of the remapped `root` if
          user-namespaces are enabled and the containerd image-store
          is used.
        type: string
      plugins:
        description: |-
          Plugins holds the default containerd namespace used for
          plugins managed by the daemon.

          The default namespace for plugins is "moby", but will be
          suffixed with the `<uid>.<gid>` of the remapped `root` if
          user-namespaces are enabled and the containerd image-store
          is used.
        type: string
    type: object
  system.DeviceInfo:
    properties:
      ID:
        description: |-
          ID is the unique identifier for the device.
          Example: CDI FQDN like "vendor.com/gpu=0", or other driver-specific device ID
        type: string
      Source:
        description: Source indicates the origin device driver.
        type: string
    type: object
  system.FirewallInfo:
    properties:
      Driver:
        description: Driver is the name of the firewall backend driver.
        type: string
      Info:
        description: Info is a list of label/value pairs, containing information related
          to the firewall.
        items:
          items:
            type: string
          type: array
        type: array
    type: object
  system.Info:
    properties:
      CpuCfsPeriod:
        type: boolean
      CpuCfsQuota:
        type: boolean
      FirewallBackend:
        $ref: '#/definitions/system.FirewallInfo'
      HttpProxy:
        type: string
      HttpsProxy:
        type: string
      architecture:
        type: string
      cdispecDirs:
        items:
          type: string
        type: array
      cgroupDriver:
        type: string
      cgroupVersion:
        type: string
      containerd:
        $ref: '#/definitions/system.ContainerdInfo'
      containerdCommit:
        $ref: '#/definitions/system.Commit'
      containers:
        type: integer
      containersPaused:
        type: integer
      containersRunning:
        type: integer
      containersStopped:
        type: integer
      cpuset:
        type: boolean
      cpushares:
        type: boolean
      debug:
        type: boolean
      defaultAddressPools:
        items:
          $ref: '#/definitions/system.NetworkAddressPool'
        type: array
      defaultRuntime:
        type: string
      discoveredDevices:
        items:
          $ref: '#/definitions/system.DeviceInfo'
        type: array
      dockerRootDir:
        type: string
      driver:
        type: string
      driverStatus:
        items:
          items:
            type: string
          type: array
        type: array
      experimentalBuild:
        type: boolean
      genericResources:
        items:
          $ref: '#/definitions/swarm.GenericResource'
        type: array
      id:
        type: string
      images:
        type: integer
      indexServerAddress:
        type: string
      initBinary:
        type: string
      initCommit:
        $ref: '#/definitions/system.Commit'
      ipv4Forwarding:
        type: boolean
      isolation:
        $ref: '#/definitions/container.Isolation'
      kernelMemory:
        description: 'Deprecated: kernel 5.4 deprecated kmem.limit_in_bytes'
        type: boolean
      kernelMemoryTCP:
        description: |-
          KernelMemoryLimit is not supported on cgroups v2.

          Deprecated: This field is deprecated and will be removed in the next release.
          Starting with kernel 6.12, the kernel has deprecated kernel memory tcp accounting
        type: boolean
      kernelVersion:
        type: string
      labels:
        items:
          type: string
        type: array
      liveRestoreEnabled:
        description: |-
          LiveRestoreEnabled determines whether containers should be kept
          running when the daemon is shutdown or upon daemon start if
          running containers are detected
        type: boolean
      loggingDriver:
        type: string
      memTotal:
        type: integer
      memoryLimit:
        type: boolean
      name:
        type: string
      ncpu:
        type: integer
      neventsListener:
        type: integer
      nfd:
        type: integer
      ngoroutines:
        type: integer
      noProxy:
        type: string
      oomKillDisable:
        type: boolean
