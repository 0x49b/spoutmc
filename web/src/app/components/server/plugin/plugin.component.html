<h3>Plugins</h3>

<clr-tabs>
  @for (server of pluginServerLists; track server; let first = $first) {

    <clr-tab>
      <button clrTabLink id="link-{{ server.id }}">{{ server.name }}</button>
      <clr-tab-content id="content-{{ server.id  }}" *clrIfActive="first">

        <app-filetree [pluginData]="server.plugins"></app-filetree>

      </clr-tab-content>
    </clr-tab>
  }
</clr-tabs>
