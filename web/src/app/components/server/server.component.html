<h2>Server</h2>
<br/>

<mat-toolbar>
  <span>
      <mat-form-field>
    <mat-label>Reload</mat-label>
    <mat-select [(value)]="reload" (selectionChange)="setNewInterval()">
      @for (r of reloadTimes; track r) {
        <mat-option [value]="r.value">{{ r.viewValue }}</mat-option>
      }
    </mat-select>
  </mat-form-field>
  </span>
  <span class="toolbar-spacer"></span>
  <span>
  <button mat-raised-button (click)="openNewServerDialog()">
    <mat-icon aria-hidden="false" aria-label="add server" fontIcon="add"></mat-icon>
    Add Server
  </button>
  </span>
</mat-toolbar>



@if (loading) {
  <mat-spinner [diameter]="35"></mat-spinner>
} @else {
  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
    <ng-container matColumnDef="Names">
      <th mat-header-cell *matHeaderCellDef>Name</th>
      <td mat-cell *matCellDef="let element"> {{ element.Names[0].replace('/', '') }}</td>
    </ng-container>

    <ng-container matColumnDef="Id">
      <th mat-header-cell *matHeaderCellDef>Id</th>
      <td mat-cell *matCellDef="let element"> {{ element.Id }}</td>
    </ng-container>

    <ng-container matColumnDef="State">
      <th mat-header-cell *matHeaderCellDef>State</th>
      <td mat-cell *matCellDef="let element"> {{ element.State }}</td>
    </ng-container>

    <ng-container matColumnDef="Action">
      <th mat-header-cell *matHeaderCellDef>Action</th>
      <td mat-cell *matCellDef="let element">
        <a mat-flat-button routerLink="/server/edit/{{element.Id}}">
          <mat-icon aria-hidden="false" aria-label="edit server" fontIcon="edit"></mat-icon>
        </a>


        @if (element.State !== 'running') {
          <button mat-flat-button (click)="startContainer(element.Id)">
            <mat-icon aria-hidden="false" aria-label="stop server" fontIcon="play_arrow"></mat-icon>
          </button>

        } @else {
          <button mat-flat-button (click)="stopContainer(element.Id)">
            <mat-icon aria-hidden="false" aria-label="stop server" fontIcon="stop"></mat-icon>
          </button>
        }


        <button mat-flat-button (click)="restartContainer(element.Id)">
          <mat-icon aria-hidden="false" aria-label="restart server" fontIcon="refresh"></mat-icon>
        </button>

        <button mat-flat-button (click)="removeContainer(element.Id)">
          <mat-icon aria-hidden="false" aria-label="restart server" fontIcon="delete"></mat-icon>
        </button>

      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
}
