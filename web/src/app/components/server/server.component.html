<h3>Server</h3>

<div class="header-container">

  <div>
    <clr-select-container>
      <label>Reload every</label>
      <select clrSelect name="options" [value]="reload" [(ngModel)]="reload" (change)="setNewInterval()">
        @for (r of reloadTimes; track r) {
          <option [value]="r.value">{{ r.viewValue }}</option>
        }
      </select>
    </clr-select-container>
  </div>
  <div>
    <button class="btn">Add Server</button>
  </div>
</div>



@if (loading) {
  <app-loader/>
} @else {
  <clr-datagrid>
    <clr-dg-column>Name</clr-dg-column>
    <clr-dg-column>State</clr-dg-column>
    <clr-dg-column>Action</clr-dg-column>

    @for (server of dataSource; track server) {
      <clr-dg-row [clrDgItem]="server">
        <clr-dg-cell>{{ server.Config.Hostname }}</clr-dg-cell>
        <clr-dg-cell>{{ server.State.Status }}</clr-dg-cell>
        <clr-dg-cell>

          @if (server.State.Status !== 'running') {
            <button type="button" class="btn btn-icon btn-success" aria-label="home"
                    (click)="startContainer(server.Id)">
              <play-outline-icon class="btn-custom-icon"></play-outline-icon>
            </button>
          } @else {
            <button type="button" class="btn btn-icon btn-danger" aria-label="home" (click)="stopContainer(server.Id)">
              <stop-outline-icon class="btn-custom-icon"></stop-outline-icon>
            </button>
          }

          <button type="button" class="btn btn-icon btn-danger" aria-label="home">
            <trash-outline-icon class="btn-custom-icon"></trash-outline-icon>
          </button>

        </clr-dg-cell>
      </clr-dg-row>
    }
    <clr-dg-footer>{{ dataSource.length }} servers</clr-dg-footer>
  </clr-datagrid>
}
